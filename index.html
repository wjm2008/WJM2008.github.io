            left: 0;

            background-size: 30px 30px;
            animation: gridMove 15s linear infinite;
        }
        
        /* 中心发光效果 */
        .cyber-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.2) 0%, rgba(0, 240, 255, 0.1) 50%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        /* 流动线条 */
        .cyber-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            height: 1px;
            width: 100%;
            animation: lineMove 4s ease-in-out infinite;
        }
        
        /* 粒子效果 */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            mix-blend-mode: screen;
        }
        
        /* 动画定义 */
        @keyframes gridMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 30px 30px;
            }
        }
        
        @keyframes glowPulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.6;
            }
        }
        
        @keyframes lineMove {
            0% {
                transform: translateY(-100%);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
        
        @keyframes cyberFloat {
            0% {
                transform: scale(0) translate(0, 0);
                opacity: 0;
            }
            20% {
                transform: scale(1) translate(-3px, -3px);
                opacity: 0.7;
            }
            40% {
                transform: scale(1.1) translate(2px, 2px);
                opacity: 0.6;
            }
            60% {
                transform: scale(0.8) translate(1px, 1px);
                opacity: 0.4;
            }
            100% {
                transform: scale(0) translate(5px, 5px);
                opacity: 0;
            }
        }
        
        /* 网站卡片 */
        .website-card {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px;
            transition: all 0.4s ease;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        /* 卡片悬停效果 */
        .website-card:hover {
            transform: perspective(1000px) rotateX(5deg) rotateY(5deg) translateY(-15px);
            box-shadow: 0 25px 50px rgba(0, 240, 255, 0.3);
            border-color: #00f0ff;
        }
        
        /* 卡片发光效果 */
        .website-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.1), transparent);
            transition: left 0.6s ease;
            z-index: -1;
        }
        
        .website-card:hover::before {
            left: 100%;
        }
        
        /* 卡片内部发光 */
        .website-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }
        
        .website-card:hover::after {
            opacity: 1;
        }
        
        /* 按钮样式 */
        .btn-primary, .copy-link-btn {
            position: relative;
            z-index: 10;
            cursor: pointer;
        }
        
        /* 按钮样式 */
        .btn-primary {

            position: relative;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;

        /* 按钮悬停效果 */
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);

        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 240, 255, 0.6);
        }
        
        /* 标题浮动动画 */

            }
        }
        
        .floating {

        /* 霓虹文字效果 */
        .neon-text {
            color: #ffffff;

            font-weight: 700;

        @keyframes neonPulse {
            from {

            right: 20px;

            padding: 15px 20px;
            border-radius: 5px;

        }
        
        .toast.show {

            from {

                url: "https://blackace.app",
                description: "网站秒变APP",
                category: "实用工具"
            }
        ];

        // 渲染网站卡片
        function renderWebsites() {
            const container = document.getElementById('websites-container');
            
            // 按分类分组
            const categories = {
                'AI工具': [],
                '开发工具': [],
                '影视资源': [],
                '实用资源': [],
                '学习资源': [],
                '实用工具': []
            };
            
            // 分类网站
            websites.forEach(site => {
                if (categories[site.category]) {
                    categories[site.category].push(site);
                }
            });
            
            // 按顺序渲染分类
            const categoryOrder = ['AI工具', '开发工具', '影视资源', '实用工具', '实用资源', '学习资源'];
            
            // 分类ID映射
            const categoryIds = {
                'AI工具': 'ai-tools',
                '开发工具': 'development-tools',
                '影视资源': 'video-resources',
                '实用资源': 'practical-resources',
                '学习资源': 'learning-resources',
                '实用工具': 'practical-tools'
            };
            
            categoryOrder.forEach((category, index) => {
                if (categories[category].length > 0) {
                    // 添加分类标题
                    const categoryTitle = document.createElement('h2');
                    categoryTitle.id = categoryIds[category];
                    categoryTitle.className = 'text-2xl font-bold mb-6 text-cyan-400 border-b border-cyan-500/30 pb-2 col-span-full';
                    categoryTitle.textContent = category;
                    container.appendChild(categoryTitle);
                    
                    // 添加分类下的网站卡片
                    categories[category].forEach(site => {
                        const card = document.createElement('div');
                        card.className = 'website-card rounded-xl p-6';
                        
                        card.innerHTML = `
                            <div class="flex items-center mb-4">
                                <div class="w-12 h-12 rounded-full bg-gradient-to-r from-[#00f0ff] to-[#9d4edd] flex items-center justify-center text-white text-xl mr-4">
                                    ${site.name.charAt(0)}
                                </div>
                                <div>
                                    <h3 class="text-xl font-bold">${site.name}</h3>
                                    <span class="text-sm">${site.category}</span>
                                </div>
                            </div>
                            <p class="mb-6">${site.description}</p>
                            <a href="${site.url}" target="_blank" class="btn-primary text-white font-medium py-2 px-6 rounded-full inline-block">
                                访问网站
                            </a>
                        `;
                        

                        
                        container.appendChild(card);
                    });
                    
                    // 在分类结尾添加换行（除了最后一个分类）
                    if (index < categoryOrder.length - 1) {
                        const divider = document.createElement('div');
                        divider.className = 'col-span-full h-8';
                        container.appendChild(divider);
                    }
                }
            });
        }

        // 创建粒子效果
        function createParticles() {
            const colors = ['#00f0ff', '#9d4edd', '#050508', '#1a1a2e', '#16213e'];
            
            // 背景粒子 - 固定在页面底部
            for (let i = 0; i < 100; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 15 + 5;
                const posX = Math.random() * window.innerWidth;
                const posY = Math.random() * window.innerHeight; // 在整个页面范围内生成
                const color = colors[Math.floor(Math.random() * colors.length)];
                const duration = Math.random() * 5 + 5;
                const delay = Math.random() * 3;
                const animationType = Math.random() > 0.5 ? 'float' : 'rotate';
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}px`;
                particle.style.top = `${posY}px`; // 使用top而不是bottom
                particle.style.backgroundColor = color;
                particle.style.opacity = Math.random() * 0.6 + 0.2;
                particle.style.animation = `${animationType} ${duration}s ease-in-out ${delay}s infinite`;
                
                if (animationType === 'rotate') {
                    particle.style.borderRadius = '0%';
                    particle.style.transformOrigin = 'center center';
                }
                
                document.body.appendChild(particle);
            }
            
            // 鼠标跟随粒子 - 科幻风格（流畅版）
            let mouseMoveTimer;
            let lastMouseX = 0;
            let lastMouseY = 0;
            
            document.addEventListener('mousemove', (e) => {
                // 计算鼠标移动速度
                const mouseSpeed = Math.sqrt(
                    Math.pow(e.clientX - lastMouseX, 2) + 
                    Math.pow(e.clientY - lastMouseY, 2)
                );
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                
                // 根据鼠标速度调整粒子数量
                const particleCount = Math.min(Math.floor(mouseSpeed / 10) + 6, 12);
                
                // 减少延迟，提高灵敏度
                clearTimeout(mouseMoveTimer);
                mouseMoveTimer = setTimeout(() => {
                    // 生成粒子
                    for (let i = 0; i < particleCount; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'particle';
                        
                        // 调整粒子尺寸
                        const size = Math.random() * 4 + 1;
                        // 颜色变化
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        const angle = Math.random() * Math.PI * 2;
                        // 根据鼠标速度调整粒子范围
                        const distance = Math.random() * (mouseSpeed / 10 + 3) + 2;
                        const xOffset = Math.cos(angle) * distance;
                        const yOffset = Math.sin(angle) * distance;
                        
                        particle.style.width = `${size}px`;
                        particle.style.height = `${size}px`;
                        particle.style.left = `${e.clientX + xOffset}px`;
                        particle.style.top = `${e.clientY + yOffset}px`; // 在鼠标位置周围生成
                        particle.style.backgroundColor = color;
                        particle.style.opacity = Math.random() * 0.4 + 0.2;
                        particle.style.borderRadius = '50%';
                        particle.style.boxShadow = `0 0 ${size * 3}px ${color}80`;
                        particle.style.filter = `blur(${Math.random() * 0.4 + 0.1}px)`;
                        
                        // 根据鼠标速度调整动画速度
                        const animationDuration = Math.random() * 0.6 + 0.3 + (100 / (mouseSpeed + 10));
                        particle.style.animation = `cyberFloat ${animationDuration}s ease-out forwards`;
                        
                        document.body.appendChild(particle);
                        
                        // 粒子消失动画
                        setTimeout(() => {
                            particle.remove();
                        }, animationDuration * 1000);
                    }
                }, 5); // 进一步减少延迟
            });
        }



        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 侧边栏功能
            const sidebarToggle = document.getElementById('sidebar-toggle');
            const sidebar = document.getElementById('sidebar');
            
            // 切换侧边栏显示/隐藏
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('translate-x-full');
            });
            
            // 点击分类链接时平滑滚动到对应分类
            const categoryLinks = sidebar.querySelectorAll('a');
            categoryLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);
                    
                    if (targetElement) {
                        // 关闭侧边栏
                        sidebar.classList.add('translate-x-full');
                        
                        // 平滑滚动到目标位置
                        targetElement.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
            
            // 点击分类导航标题回到顶部
            const categoryNavTitle = document.getElementById('category-nav-title');
            categoryNavTitle.addEventListener('click', function() {
                // 关闭侧边栏
                sidebar.classList.add('translate-x-full');
                
                // 平滑滚动到顶部
                document.querySelector('#top').scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            });
            
            // 版本号随页面下滑而隐藏
            const versionInfo = document.getElementById('version-info');
            window.addEventListener('scroll', () => {
                // 当页面滚动超过100px时，版本号开始隐藏
                const scrollY = window.scrollY;
                const opacity = Math.max(0, 0.7 - (scrollY / 1000));
                versionInfo.style.opacity = opacity;
                
                // 当透明度为0时，完全隐藏元素
                if (opacity === 0) {
                    versionInfo.style.display = 'none';
                } else {
                    versionInfo.style.display = 'block';
                }
            });
            
            // 初始化页面
            renderWebsites();
            createParticles();
        });
    </script>
</body>
</html>
